name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codaze
    steps:
      - name: Checkout codaze
        uses: actions/checkout@v5
        with:
          path: codaze

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: codaze -> target

      - name: Check local Codex override is not active
        run: bash scripts/check-no-local-codex-override.sh

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Validate release metadata
        if: startsWith(github.ref, 'refs/tags/')
        run: bash scripts/check-release-metadata.sh "${{ github.ref_name }}"

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test -q

      - name: Run cargo-deny
        run: cargo deny check

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: codaze-x86_64-unknown-linux-gnu.tar.gz
            binary_name: codaze
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_name: codaze-aarch64-unknown-linux-gnu.tar.gz
            binary_name: codaze
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive_name: codaze-x86_64-apple-darwin.tar.gz
            binary_name: codaze
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: codaze-aarch64-apple-darwin.tar.gz
            binary_name: codaze
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: codaze-x86_64-pc-windows-msvc.zip
            binary_name: codaze.exe
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive_name: codaze-aarch64-pc-windows-msvc.zip
            binary_name: codaze.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: codaze
    steps:
      - name: Checkout codaze
        uses: actions/checkout@v5
        with:
          path: codaze

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: codaze -> target

      - name: Install cargo-about
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-about@0.8.4

      - name: Validate release metadata
        if: startsWith(github.ref, 'refs/tags/')
        run: bash scripts/check-release-metadata.sh "${{ github.ref_name }}"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Generate third-party licenses
        run: cargo about -L off generate --target ${{ matrix.target }} --output-file THIRD_PARTY_LICENSES.md about.hbs

      - name: Package release archive (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/
          cp LICENSE NOTICE dist/
          cp THIRD_PARTY_LICENSES.md dist/
          tar -C dist -czf ${{ matrix.archive_name }} \
            ${{ matrix.binary_name }} \
            LICENSE \
            NOTICE \
            THIRD_PARTY_LICENSES.md
          shasum -a 256 "${{ matrix.archive_name }}" > "${{ matrix.archive_name }}.sha256"

      - name: Package release archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          Copy-Item "LICENSE" "dist/LICENSE"
          Copy-Item "NOTICE" "dist/NOTICE"
          Copy-Item "THIRD_PARTY_LICENSES.md" "dist/THIRD_PARTY_LICENSES.md"
          Compress-Archive -Path `
            "dist/${{ matrix.binary_name }}", `
            "dist/LICENSE", `
            "dist/NOTICE", `
            "dist/THIRD_PARTY_LICENSES.md" `
            -DestinationPath "${{ matrix.archive_name }}"
          $hash = (Get-FileHash "${{ matrix.archive_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive_name }}" | Out-File -FilePath "${{ matrix.archive_name }}.sha256" -Encoding ascii

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.archive_name }}
          path: |
            codaze/${{ matrix.archive_name }}
            codaze/${{ matrix.archive_name }}.sha256

  publish:
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') && needs.verify.result == 'success' }}
    needs:
      - verify
      - build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codaze
    steps:
      - name: Checkout codaze
        uses: actions/checkout@v5
        with:
          path: codaze

      - name: Validate release metadata
        run: bash scripts/check-release-metadata.sh "${{ github.ref_name }}"

      - name: Render release notes
        run: |
          mkdir -p dist
          bash scripts/render-release-notes.sh "${{ github.ref_name }}" > dist/RELEASE_NOTES.md

      - name: Download packaged archives
        uses: actions/download-artifact@v6
        with:
          path: codaze/artifacts
          pattern: codaze-*
          merge-multiple: true

      - name: Detect packaged archives
        id: packaged_archives
        run: |
          shopt -s nullglob
          archives=(artifacts/*.tar.gz artifacts/*.zip)
          if [ "${#archives[@]}" -eq 0 ]; then
            echo "has_archives=false" >> "$GITHUB_OUTPUT"
            echo "archive_count=0" >> "$GITHUB_OUTPUT"
            echo "::warning::no packaged archives were produced by the build matrix; skipping GitHub Release publish"
            exit 0
          fi
          echo "has_archives=true" >> "$GITHUB_OUTPUT"
          echo "archive_count=${#archives[@]}" >> "$GITHUB_OUTPUT"

      - name: Attach artifacts to GitHub Release
        if: steps.packaged_archives.outputs.has_archives == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: codaze/dist/RELEASE_NOTES.md
          files: |
            codaze/artifacts/*.tar.gz
            codaze/artifacts/*.zip
            codaze/artifacts/*.sha256
