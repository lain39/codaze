[graph]
targets = [
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
version = 2
yanked = "warn"
ignore = [
    "RUSTSEC-2024-0388", # derivative via upstream Codex starlark stack
    "RUSTSEC-2024-0436", # paste via upstream Codex starlark stack
    "RUSTSEC-2025-0057", # fxhash via upstream Codex starlark stack
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSL-1.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false

[bans]
multiple-versions = "allow" # upstream Codex currently carries intentional duplicate versions across starlark/rama/platform trees
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/openai/codex.git",
    "https://github.com/openai-oss-forks/tokio-tungstenite",
    "https://github.com/openai-oss-forks/tungstenite-rs",
]
